<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNNK Klimamonitor</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dnnk-blue: #5B9BBF;
    --dnnk-blue-dark: #3a6e8a;
    --dnnk-green: #7DB65A;
    --dnnk-gray: #58595B;
    --bg: #F4F6F8;
    --card: #ffffff;
    --border: #D9E2E8;
    --text: #2C2C2C;
    --muted: #737577;
    --ted-blue: #1a4d6e;
    --ted-pale: #e8f4fd;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--card);
    border-bottom: 3px solid var(--dnnk-blue);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .logo-area { display:flex; align-items:center; gap:0.75rem; }
  .logo-text { font-size:0.78rem; color:var(--muted); font-weight:400; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dnnk-green);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .read-count {
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }
  .read-count:hover { color: var(--dnnk-blue); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .search-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .search-bar input {
    flex: 1;
    padding: 0.85rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    font-family: 'Roboto', sans-serif;
    font-size: 0.9rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--dnnk-blue); }

  .btn {
    padding: 0.85rem 1.5rem;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--dnnk-blue); color: white; }
  .btn-primary:hover { background: var(--dnnk-blue-dark); }
  .btn-secondary { background: var(--card); color: var(--dnnk-blue); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--dnnk-blue); }

  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .filter-btn {
    padding: 0.3rem 0.9rem;
    border-radius: 2px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--dnnk-blue);
    color: var(--dnnk-blue);
    background: #EBF4F9;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.25rem;
  }

  .stat-card .label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .stat-card .value {
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--dnnk-blue);
    line-height: 1;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.75rem;
  }

  .section-title {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .section-count {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .sort-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .sort-btn {
    padding: 0.25rem 0.75rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    color: var(--muted);
    transition: all 0.15s;
  }
  .sort-btn.active {
    background: var(--dnnk-blue);
    color: white;
    border-color: var(--dnnk-blue);
  }

  .hide-read-btn {
    margin-left: auto;
    padding: 0.25rem 0.75rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    color: var(--muted);
    transition: all 0.15s;
  }
  .hide-read-btn.active { background: var(--dnnk-blue); color: white; border-color: var(--dnnk-blue); }

  .articles-grid {
    display: grid;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .article-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--dnnk-blue);
    border-radius: 0 2px 2px 0;
    padding: 1.25rem 1.5rem;
    transition: all 0.15s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: start;
    position: relative;
  }

  .article-card:hover {
    border-left-color: var(--dnnk-green);
    box-shadow: 0 2px 8px rgba(91,155,191,0.12);
  }

  .article-card.is-read {
    opacity: 0.45;
    border-left-color: var(--border);
  }
  .article-card.is-read:hover { opacity: 0.7; }

  .article-card.is-new { border-left-color: var(--dnnk-green); }

  .new-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    background: var(--dnnk-green);
    color: white;
    border-radius: 2px;
    font-size: 0.62rem;
    font-weight: 500;
    margin-left: 0.4rem;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .artikel-kilde-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    background: #EBF4F9;
    color: var(--dnnk-blue);
    border-radius: 2px;
    font-size: 0.62rem;
    font-weight: 500;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .article-title {
    font-weight: 500;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 0.3rem;
    line-height: 1.4;
  }
  .article-title a { color: inherit; text-decoration: none; }
  .article-title a:hover { color: var(--dnnk-blue); text-decoration: underline; }

  .article-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .article-summary {
    font-size: 0.85rem;
    color: #444;
    line-height: 1.6;
  }

  .tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
    align-items: center;
  }

  .tag {
    padding: 0.15rem 0.5rem;
    background: #EBF4F9;
    color: var(--dnnk-blue);
    border-radius: 2px;
    font-size: 0.68rem;
    font-weight: 500;
  }

  .article-actions {
    display: flex;
    gap: 0.35rem;
    align-items: center;
    margin-left: auto;
  }

  .mark-read-btn {
    padding: 0.2rem 0.6rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 0.68rem;
    font-family: 'Roboto', sans-serif;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .mark-read-btn:hover { border-color: var(--dnnk-blue); color: var(--dnnk-blue); }
  .article-card.is-read .mark-read-btn { color: var(--dnnk-green); border-color: var(--dnnk-green); }

  .relevance-btn {
    padding: 0.2rem 0.5rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    line-height: 1;
  }
  .relevance-btn:hover { border-color: var(--dnnk-green); }
  .relevance-btn.up.active { background: var(--dnnk-green); color: white; border-color: var(--dnnk-green); }
  .relevance-btn.down.active { background: #d9534f; color: white; border-color: #d9534f; }

  .relevance-bar { width: 48px; text-align: right; }
  .relevance-score {
    font-size: 0.72rem;
    color: var(--dnnk-green);
    font-weight: 500;
  }

  .ted-card {
    background: var(--ted-pale);
    border: 1px solid #bee3f8;
    border-left: 4px solid var(--ted-blue);
    border-radius: 0 2px 2px 0;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  .ted-card:hover { border-color: var(--ted-blue); }
  .ted-title { font-weight: 500; font-size: 0.92rem; color: var(--ted-blue); margin-bottom: 0.3rem; }
  .ted-title a { color: inherit; text-decoration: none; }
  .ted-title a:hover { text-decoration: underline; }
  .ted-meta { font-size: 0.72rem; color: var(--muted); }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.82rem;
  }
  .loading-dot { display: inline-block; animation: blink 1.4s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:0; } 40% { opacity:1; } }

  .error {
    background: #fff5f5;
    border: 1px solid #fed7d7;
    border-radius: 2px;
    padding: 1rem 1.25rem;
    color: #c53030;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.88rem; }

  .gruppe-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    font-size: 0.62rem;
    font-weight: 500;
    background: #EBF4F9;
    color: var(--dnnk-blue);
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .laest-separator {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.5rem 0 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .article-card { grid-template-columns: 1fr; }
    .relevance-bar { display: none; }
  }
</style>
</head>

<script>
const PROXY = 'https://dnnk-klimamonitor-proxy.onrender.com';
let allArticles = [];
let currentFilter = 'alle';
let currentSort = 'date';
let hideRead = false;
let readArticles = new Set(JSON.parse(localStorage.getItem('dnnk_read') || '[]'));
let seenArticles = new Set(JSON.parse(localStorage.getItem('dnnk_seen') || '[]'));
let relevanceVotes = JSON.parse(localStorage.getItem('dnnk_relevance') || '{}');

// ─── DR-filter ─────────────────────────────────────────────
const DR_IRRELEVANT = [
  'sport', 'fodbold', 'håndbold', 'tennis', 'ol ', 'vm ', 'em ',
  'kongehus', 'kriminalitet', 'drab', 'mord', 'terror',
  'prinsesse', 'kronprins', 'dronning', 'royale',
  'celebrity', 'kendis', 'stjerne',
  'underholdning', 'musik', 'film', 'serie',
  'bitcoin', 'krypto', 'aktier',
];

function isRelevantArticle(a) {
  if (!a.feedSource || !a.feedSource.toLowerCase().includes('dr')) return true;
  const text = ((a.title || '') + ' ' + (a.summary || '')).toLowerCase();
  return !DR_IRRELEVANT.some(word => text.includes(word));
}

// ─── Storage ────────────────────────────────────────────────
function saveRead() {
  localStorage.setItem('dnnk_read', JSON.stringify([...readArticles]));
  updateReadCount();
}
function saveSeen() { localStorage.setItem('dnnk_seen', JSON.stringify([...seenArticles])); }
function saveVotes() { localStorage.setItem('dnnk_relevance', JSON.stringify(relevanceVotes)); }

function updateReadCount() {
  document.getElementById('read-count-display').textContent = readArticles.size + ' læst';
}

function clearAllRead() {
  if (confirm('Nulstil alle læste artikler?')) {
    readArticles.clear(); seenArticles.clear();
    saveRead(); saveSeen();
    renderArticles(allArticles);
  }
}

// ─── Sorting & filtering ────────────────────────────────────
function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + sort).classList.add('active');
  renderArticles(allArticles);
}

function toggleHideRead() {
  hideRead = !hideRead;
  document.getElementById('hide-read-btn').classList.toggle('active', hideRead);
  renderArticles(allArticles);
}

function setFilter(gruppe, event) {
  currentFilter = gruppe;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (event) event.target.classList.add('active');
  renderArticles(allArticles);
}

function getArticleId(a) {
  return ((a.title || '') + '|' + (a.feedSource || a.org || '')).trim() || Math.random().toString();
}

function isNewArticle(a) { return !seenArticles.has(getArticleId(a)); }

function sortArticles(articles) {
  if (currentSort === 'date') {
    return [...articles].sort((a, b) => new Date(b.date||0) - new Date(a.date||0));
  } else {
    return [...articles].sort((a, b) => (b.relevance||0) - (a.relevance||0));
  }
}

// ─── Relevance voting ───────────────────────────────────────
function voteRelevance(encodedId, direction) {
  const id = decodeURIComponent(encodedId);
  if (relevanceVotes[id] === direction) {
    delete relevanceVotes[id];
  } else {
    relevanceVotes[id] = direction;
  }
  saveVotes();
  renderArticles(allArticles);
}

// ─── Render ─────────────────────────────────────────────────
function renderArticles(articles) {
  const container = document.getElementById('articles-container');

  // Filtrer DR-irrelevante fra
  let filtered = articles.filter(isRelevantArticle);

  // Kategori-filter
  if (currentFilter !== 'alle') {
    filtered = filtered.filter(a => a.gruppe === currentFilter);
  }

  // Skjul læste
  if (hideRead) filtered = filtered.filter(a => !readArticles.has(getArticleId(a)));

  // Sorter: ulæste øverst
  const ulaesteArtikler = filtered.filter(a => !readArticles.has(getArticleId(a)));
  const laesteArtikler = filtered.filter(a => readArticles.has(getArticleId(a)));
  filtered = [...sortArticles(ulaesteArtikler), ...sortArticles(laesteArtikler)];

  const unread = filtered.filter(a => !readArticles.has(getArticleId(a))).length;
  document.getElementById('articles-count').textContent = `${filtered.length} resultater · ${unread} ulæste`;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Ingen artikler fundet</div>';
    return;
  }

  const foersteLaest = filtered.findIndex(a => readArticles.has(getArticleId(a)));

  container.innerHTML = filtered.map((a, index) => {
    const id = getArticleId(a);
    const isRead = readArticles.has(id);
    const isNew = isNewArticle(a);
    const vote = relevanceVotes[encodeURIComponent(id)] || null;
    const separator = (index === foersteLaest && foersteLaest > 0)
      ? `<div class="laest-separator">Allerede læst</div>` : '';

    return separator + `
      <div class="article-card ${isRead ? 'is-read' : ''} ${isNew && !isRead ? 'is-new' : ''}">
        <div>
          <div class="article-title">
            <a href="${a.url || '#'}" target="_blank" onclick="markAsRead('${encodeURIComponent(id)}')">${a.title || 'Uden titel'}</a>
            ${a.gruppe ? `<span class="gruppe-badge">${a.gruppe}</span>` : ''}
            ${isNew && !isRead ? '<span class="new-badge">Ny</span>' : ''}
          </div>
          <div class="article-meta">${a.feedSource || ''} · ${a.date || ''}</div>
          <div class="article-summary">${(a.summary || '').slice(0, 220)}${(a.summary||'').length > 220 ? '...' : ''}</div>
          <div class="tags">
            ${(a.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
            <div class="article-actions">
              <button class="relevance-btn up ${vote==='up'?'active':''}" onclick="voteRelevance('${encodeURIComponent(id)}','up')" title="Relevant">👍</button>
              <button class="relevance-btn down ${vote==='down'?'active':''}" onclick="voteRelevance('${encodeURIComponent(id)}','down')" title="Ikke relevant">👎</button>
              <button class="mark-read-btn" onclick="toggleRead('${encodeURIComponent(id)}')">${isRead ? '✓ Læst' : 'Markér læst'}</button>
            </div>
          </div>
        </div>
        <div class="relevance-bar">
          <div class="relevance-score">${Math.round((a.relevance||0)*100)}%</div>
        </div>
      </div>`;
  }).join('');
}

function markAsRead(encodedId) {
  readArticles.add(decodeURIComponent(encodedId));
  saveRead();
  setTimeout(() => renderArticles(allArticles), 200);
}

function toggleRead(encodedId) {
  const id = decodeURIComponent(encodedId);
  if (readArticles.has(id)) { readArticles.delete(id); } else { readArticles.add(id); }
  saveRead();
  renderArticles(allArticles);
}

function renderTed(notices) {
  const container = document.getElementById('ted-container');
  document.getElementById('ted-count').textContent = `${notices.length} udbud`;
  if (notices.length === 0) {
    container.innerHTML = '<div class="empty">Ingen aktuelle EU-udbud fundet</div>';
    return;
  }
  container.innerHTML = notices.slice(0,10).map(n => {
    let title = n.title || {};
    if (typeof title === 'object') title = title.dan || title.eng || 'Uden titel';
    const date = (n.publicationDate || '').slice(0,10);
    return `<div class="ted-card">
      <div class="ted-title"><a href="${n.tedPublicationUrl||'#'}" target="_blank">${title}</a></div>
      <div class="ted-meta">TED EU · ${date}</div>
    </div>`;
  }).join('');
}

function markCurrentAsSeen() {
  allArticles.forEach(a => seenArticles.add(getArticleId(a)));
  saveSeen();
}

// ─── Fetch ──────────────────────────────────────────────────
async function search() {
  const q = document.getElementById('search-input').value || 'klimatilpasning';
  const articlesContainer = document.getElementById('articles-container');
  const tedContainer = document.getElementById('ted-container');

  articlesContainer.innerHTML = '<div class="loading">Henter artikler<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';
  tedContainer.innerHTML = '<div class="loading">Henter EU-udbud<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';

  try {
    const [newsRes, tedRes, scrapeRes] = await Promise.all([
      fetch(`${PROXY}/news/full?q=${encodeURIComponent(q)}&limit=5`),
      fetch(`${PROXY}/ted?q=${encodeURIComponent(q)}&size=10`),
      fetch(`${PROXY}/news/scrape?q=${encodeURIComponent(q)}`)
    ]);

    const newsData = await newsRes.json();
    const tedData = await tedRes.json();
    const scrapeData = await scrapeRes.json();

    allArticles = [...(newsData.articles||[]), ...(scrapeData.articles||[])];
    const notices = tedData.notices || tedData.results || [];

    document.getElementById('stat-articles').textContent = allArticles.length;
    document.getElementById('stat-ted').textContent = notices.length;
    document.getElementById('stat-feeds').textContent = newsData.feeds_checked || '153';
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('stat-time').textContent = t;
    document.getElementById('last-scan').textContent = `Scannet ${t}`;

    renderArticles(allArticles);
    renderTed(notices);
    setTimeout(markCurrentAsSeen, 3000);

  } catch(e) {
    articlesContainer.innerHTML = `<div class="error">Kunne ikke hente data: ${e.message}. Serveren vågner op — prøv igen om 30 sekunder.</div>`;
    tedContainer.innerHTML = '';
  }
}

async function autoScan() {
  const queries = ['klimatilpasning skybrud', 'LAR regnvand', 'spildevand klimasikring', 'kystbeskyttelse', 'vandforsyning'];
  document.getElementById('articles-container').innerHTML = '<div class="loading">Scanner alle feeds<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';

  const all = [], tedAll = [];

  for (const q of queries) {
    try {
      const res = await fetch(`${PROXY}/news/full?q=${encodeURIComponent(q)}&limit=4`);
      const data = await res.json();
      all.push(...(data.articles||[]));
    } catch {}
  }

  try {
    const scrapeRes = await fetch(`${PROXY}/news/scrape?q=klimatilpasning`);
    const scrapeData = await scrapeRes.json();
    all.push(...(scrapeData.articles||[]));
  } catch {}

  try {
    const tedRes = await fetch(`${PROXY}/ted?q=klimatilpasning&size=10`);
    const tedData = await tedRes.json();
    tedAll.push(...(tedData.notices||tedData.results||[]));
  } catch {}

  const seen = new Set();
  allArticles = all.filter(a => {
    if (seen.has(a.title)) return false;
    seen.add(a.title);
    return true;
  }).sort((a,b) => (b.relevance||0) - (a.relevance||0));

  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('stat-articles').textContent = allArticles.length;
  document.getElementById('stat-ted').textContent = tedAll.length;
  document.getElementById('stat-feeds').textContent = '153';
  document.getElementById('stat-time').textContent = t;
  document.getElementById('last-scan').textContent = `Scannet ${t}`;

  renderArticles(allArticles);
  renderTed(tedAll);
  setTimeout(markCurrentAsSeen, 3000);
}

// Init
updateReadCount();
</script>
